<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f3f1ec">
    <title>BROKEN MEMORY — Reconstruction Agency</title>
    <style>
    :root {
        --paper: #f3f1ec;
        --ink: #111110;
        --ink-soft: #5b5950;
        --accent: #1f3bff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--paper); color: var(--ink); }
    body {
        min-height: 100dvh;
        overflow-x: hidden;
        font-family: ui-monospace, "SFMono-Regular", "Roboto Mono", Menlo, Consolas, monospace;
    }

    /* Base soft glow: very faint blue/purple animated halo, the underlying color the translucent glass "refracts" */
    #aura {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
            radial-gradient(42vw 42vw at 22% 82%, rgba(90, 120, 255, 0.12), transparent 70%),
            radial-gradient(46vw 46vw at 82% 28%, rgba(160, 110, 255, 0.10), transparent 70%),
            radial-gradient(52vw 52vw at 62% 104%, rgba(70, 160, 255, 0.10), transparent 72%);
        filter: blur(8px);
        animation: auraDrift 28s ease-in-out infinite alternate;
    }
    @keyframes auraDrift {
        from { transform: translate3d(-2%, 1%, 0) scale(1.05); }
        to   { transform: translate3d(2%, -1%, 0) scale(1.12); }
    }

    /* Pixel memory field: translucent glass tiles (transparent background reveals the glow underneath) */
    #memory-field {
        position: fixed;
        inset: 0;
        width: 100%; height: 100%;
        z-index: 0;
        pointer-events: none;
        display: block;
        filter: blur(1.4px);
        opacity: 0.95;
    }

    .stage {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        padding: calc(env(safe-area-inset-top) + 16px) 18px calc(env(safe-area-inset-bottom) + 16px);
    }

    /* Top bar (Swiss-style technical labels) */
    .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        line-height: 1.5;
    }
    .topbar .brand b { font-weight: 700; }

    /* Solid hero title: bold, with a paper-colored glow, always readable above the haze */
    .hero { margin-top: 30px; }
    .hero h1 {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-weight: 800;
        font-size: clamp(54px, 19vw, 132px);
        line-height: 0.92;
        letter-spacing: -2px;
        margin-left: -0.055em;   /* offset the capital letter's left bearing so the B's left edge aligns exactly with the text above and below */
        /* Vertical gradient, gray to black: faint at the top, solid at the bottom */
        background: linear-gradient(180deg, #b4b1a8 0%, #6b685f 38%, #100f0d 92%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        /* Soft paper-colored glow -> hazy, emerging-from-the-mist feel while staying readable */
        filter: drop-shadow(0 0 10px var(--paper)) drop-shadow(0 2px 16px var(--paper));
    }
    .hero .lead {
        margin-top: 22px;
        max-width: 26ch;
        font-size: clamp(15px, 4.6vw, 20px);
        line-height: 1.75;          /* larger line height, easier to read over the noisy background */
        font-weight: 500;
        color: var(--ink);
        /* Very subtle frosted backing, left edge flush with the grid (no left padding) */
        padding: 10px 16px 10px 0;
        background: linear-gradient(90deg, rgba(243,241,236,0.5), rgba(243,241,236,0.12));
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
        text-shadow: 0 0 8px var(--paper);
    }

    /* Bottom content group */
    .bottom { margin-top: auto; }

    .meta {
        display: grid;
        gap: 14px;
        margin-bottom: 22px;
    }
    .meta .row {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 12px;
        align-items: start;
    }
    .meta .tag {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--ink-soft);
        text-transform: uppercase;
        padding-top: 2px;
    }
    .meta .tag::before { content: "[ "; }
    .meta .tag::after  { content: " ]"; }
    .meta p {
        font-size: 12px;
        line-height: 1.55;
        color: var(--ink);
        max-width: 46ch;
        text-shadow: 0 0 9px var(--paper), 0 0 9px var(--paper);
    }
    .meta .tag { text-shadow: 0 0 9px var(--paper), 0 0 9px var(--paper); }

    /* Upload interaction */
    #fileInput { display: none; }

    .pick {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 18px 20px;
        border: 2.5px solid var(--ink);     /* thicker border to boost the CTA's visual weight */
        background: var(--paper);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--ink);   /* hard shadow, "lifts" it off the background */
        transition: background .15s, color .15s, box-shadow .12s, transform .12s;
    }
    .pick .arrow { font-weight: 400; font-size: 18px; }

    .drop-extra {
        margin-top: 8px;
        font-size: 10px;
        letter-spacing: .5px;
        color: var(--ink-soft);
        text-transform: uppercase;
    }

    /* Object count slider */
    .count-ctl { margin-bottom: 20px; }
    .count-head { display: flex; justify-content: space-between; align-items: baseline;
                  font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--ink); }
    .count-val { font-family: "Helvetica Neue", Arial, sans-serif; font-weight: 800;
                 font-size: 22px; letter-spacing: -1px; }
    #countSlider { -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
                   background: rgba(17,17,16,.2); margin: 12px 0 5px; cursor: pointer; }
    #countSlider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
                   width: 20px; height: 20px; background: var(--ink); border: 0; cursor: pointer; }
    #countSlider::-moz-range-thumb { width: 20px; height: 20px; background: var(--ink);
                   border: 0; border-radius: 0; cursor: pointer; }
    .count-scale { display: flex; justify-content: space-between;
                   font-size: 9px; letter-spacing: 1px; color: var(--ink-soft); }

    .file-preview {
        display: none;
        margin-top: 12px;
        align-items: center;
        gap: 12px;
        background: var(--paper);
        border: 1px solid var(--ink);
        padding: 10px;
    }
    .file-preview.show { display: flex; }
    .file-preview img {
        width: 48px; height: 48px;
        object-fit: cover;
        flex: none;
        image-rendering: pixelated;
        filter: grayscale(1) contrast(1.1);
    }
    .file-preview .name { font-size: 11px; font-weight: 700; word-break: break-all; }
    .file-preview .size { font-size: 10px; color: var(--ink-soft); margin-top: 2px; }

    .start {
        display: none;
        margin-top: 10px;
        width: 100%;
        padding: 15px;
        border: none;
        background: var(--ink);
        color: var(--paper);
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
    }
    .start.show { display: block; }
    .start:disabled { opacity: .5; }

    .loading { display: none; margin-top: 12px; }
    .loading.show { display: block; }
    .loading .progress {
        margin-top: 8px; font-size: 10px; letter-spacing: 1px;
        color: var(--ink-soft); text-transform: uppercase;
    }

    .footer {
        display: flex;
        justify-content: space-between;
        margin-top: 18px;
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--ink-soft);
        text-transform: uppercase;
    }

    /* ── Entrance: "developing" out of the blank paper ─────────────────── */
    #boot {
        position: fixed; inset: 0;
        background: var(--paper);
        z-index: 5;
        pointer-events: none;
        animation: bootOut 1.1s ease forwards;
    }
    @keyframes bootOut { from { opacity: 1; } to { opacity: 0; } }

    @keyframes riseIn {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    .topbar { animation: riseIn .8s .05s ease-out both; }
    .hero   { animation: riseIn 1s .25s cubic-bezier(.2,.7,.2,1) both; }
    .bottom { animation: riseIn 1s .45s cubic-bezier(.2,.7,.2,1) both; }

    /* ── Interaction feedback: buttons ───────────────────────────────── */
    /* Hover: whole block turns solid black, text inverts to white, slight lift (high contrast, strongly signals clickability) */
    .pick:hover { background: var(--ink); color: var(--paper); transform: translate(-1px, -1px); box-shadow: 6px 6px 0 rgba(17, 17, 16, .35); }
    .pick:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }
    .start { transition: transform .08s, filter .15s, opacity .15s; }
    .start:hover:not(:disabled) { filter: brightness(1.18); }
    .start:active:not(:disabled) { transform: scale(.985); }

    /* ── Waiting animation: flat -> 3D reconstruction ─────────────────── */
    .recon { width: 60px; height: 60px; margin: 4px 0 14px; perspective: 240px; }
    .recon-cube {
        position: relative; width: 100%; height: 100%;
        transform-style: preserve-3d;
        animation: reconSpin 3.6s ease-in-out infinite;
    }
    .recon-cube .f {
        position: absolute; inset: 0;
        border: 1.5px solid var(--ink);
        background: rgba(17, 17, 16, .04);
    }
    .recon-cube .fr { transform: translateZ(30px); }
    .recon-cube .bk { transform: rotateY(180deg) translateZ(30px); }
    .recon-cube .rt { transform: rotateY(90deg)  translateZ(30px); }
    .recon-cube .lf { transform: rotateY(-90deg) translateZ(30px); }
    .recon-cube .tp { transform: rotateX(90deg)  translateZ(30px); }
    .recon-cube .bm { transform: rotateX(-90deg) translateZ(30px); }
    /* Rotation + thickness swelling from flat to solid and back -> "the plane becomes 3D" */
    @keyframes reconSpin {
        0%   { transform: rotateX(-22deg) rotateY(0deg)   scaleZ(.08); }
        50%  { transform: rotateX(-22deg) rotateY(180deg) scaleZ(1); }
        100% { transform: rotateX(-22deg) rotateY(360deg) scaleZ(.08); }
    }

    @media (prefers-reduced-motion: reduce) {
        #boot, .topbar, .hero, .bottom { animation: none; }
        .recon-cube { animation: reconSpin 4s linear infinite; }
    }

    @media (min-width: 760px) {
        .stage { padding-left: 40px; padding-right: 40px; }
        .bottom { max-width: 560px; }
    }
    </style>
</head>
<body>

<div id="boot"></div>
<div id="aura"></div>
<canvas id="memory-field"></canvas>

<div class="stage">
    <header class="topbar">
        <div class="brand">
            <b>MEMORY RECONSTRUCTION</b>
        </div>
    </header>

    <section class="hero">
        <h1>BROKEN<br>MEMORY</h1>
        <p class="lead">Hand over a photograph. Let a black box remember the parts it never saw.</p>
    </section>

    <div class="bottom">
        <div class="uploader">
            <div class="count-ctl">
                <div class="count-head">
                    <span>Objects to reconstruct</span>
                    <span class="count-val" id="countVal">{{ default_objects }}</span>
                </div>
                <input type="range" id="countSlider" min="{{ min_objects }}" max="{{ max_objects }}"
                       value="{{ default_objects }}" step="1">
                <div class="count-scale"><span>{{ min_objects }} MIN</span><span>{{ max_objects }} MAX</span></div>
            </div>

            <div class="drop-zone" id="dropZone">
                <button type="button" class="pick" onclick="document.getElementById('fileInput').click()">
                    <span>Upload a photograph</span>
                    <span class="arrow">&rarr;</span>
                </button>
                <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/bmp">
                <div class="drop-extra">PNG / JPG / WEBP / BMP — MAX 16MB</div>
            </div>

            <div class="file-preview" id="filePreview">
                <img id="previewImg" src="" alt="preview">
                <div>
                    <div class="name" id="fileName">filename.png</div>
                    <div class="size" id="fileSize">0 KB</div>
                </div>
            </div>

            <button class="start" id="uploadBtn" disabled>Begin reconstruction &rarr;</button>

            <div class="loading" id="loading">
                <div class="recon" aria-hidden="true">
                    <div class="recon-cube">
                        <span class="f fr"></span><span class="f bk"></span>
                        <span class="f rt"></span><span class="f lf"></span>
                        <span class="f tp"></span><span class="f bm"></span>
                    </div>
                </div>
                <div class="progress" id="progressText">QUEUED…</div>
            </div>
        </div>

        <footer class="footer">
            <span>One click to outsource your past.</span>
        </footer>
    </div>
</div>

<script>
/* Memory field: translucent glass tiles + depth-of-field overlap + parallax / gathering */
(function () {
    const canvas = document.getElementById('memory-field');
    const ctx = canvas.getContext('2d');
    const TAU = Math.PI * 2;
    const hasRound = typeof ctx.roundRect === 'function';

    let cells = [], cell = 0, dpr = 1, W = 0, H = 0;

    // Each tile draws a set of random parameters; fore/background layers get different size, opacity, and depth (for overlap and parallax)
    function reseed(p) {
        p.freq  = 0.16 + Math.random() * 1.0;
        p.phase = Math.random() * TAU;
        p.on    = 1.8 + Math.random() * 3.2;        // lit for 1.8-5s
        p.off   = 5.0 + Math.random() * 16.0;       // off for 5-21s -> sparser
        p.cycle = p.on + p.off;
        p.blue  = Math.random() < 0.010;
        if (p.back) {                                // background layer: large and very faint, small parallax
            p.cw = 2 + (Math.random() * 2 | 0);
            p.ch = 2 + (Math.random() * 2 | 0);
            p.maxA = 0.05 + Math.random() * 0.10;
            p.depth = 0.16 + Math.random() * 0.18;
        } else {                                     // foreground layer: small and brighter, large parallax
            p.cw = 1;
            p.ch = Math.random() < 0.18 ? 2 : 1;
            p.maxA = 0.14 + Math.random() * 0.20;
            p.depth = 0.60 + Math.random() * 0.38;
        }
    }

    function build() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth; H = window.innerHeight;
        canvas.width = W * dpr; canvas.height = H * dpr;
        canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        cell = W < 760 ? 24 : 30;
        const cols = Math.ceil(W / cell), rows = Math.ceil(H / cell);

        cells = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = c * cell, y = r * cell;
                const ny = (y + cell / 2) / H;
                const band = Math.exp(-Math.pow((ny - 0.42) / 0.34, 2));
                const presence = 0.12 + band * 0.26;
                if (Math.random() > presence) continue;
                const p = { x, y, ny, back: Math.random() < 0.5 };
                reseed(p);
                p.t = Math.random() * p.cycle;       // random initial phase -> steady-state sparsity from the start
                cells.push(p);
            }
        }
        cells.sort((a, b) => a.depth - b.depth);     // draw background layer first -> translucent glass overlaps naturally
    }

    // ── Interaction: pointer glow / click ripples / CTA hover gathering ──
    let px = 0, py = 0, pAt = -1e9, mouseValid = false;
    const ripples = [];
    let pull = 0, pullTarget = 0;
    let recon = 0, reconTarget = 0;                 // "reconstruction" state: gather toward center + faster flicker
    window.memoryReconstruct = (on) => { reconTarget = on ? 1 : 0; };
    function pointer(e) { px = e.clientX; py = e.clientY; pAt = performance.now(); mouseValid = true; }
    window.addEventListener('pointermove', pointer, { passive: true });
    window.addEventListener('pointerdown', (e) => {
        pointer(e);
        ripples.push({ x: e.clientX, y: e.clientY, t: performance.now() });
        if (ripples.length > 6) ripples.shift();
    }, { passive: true });

    function drawTile(x, y, w, h, fill, stroke) {
        ctx.beginPath();
        if (hasRound) ctx.roundRect(x, y, w, h, 3); else ctx.rect(x, y, w, h);
        ctx.fillStyle = fill; ctx.fill();
        ctx.lineWidth = 1; ctx.strokeStyle = stroke; ctx.stroke();
    }

    let prev = 0, t0 = 0;
    function frame(tMs) {
        const now = tMs / 1000;
        if (!t0) t0 = now;
        const elapsed = now - t0;
        const dt = prev ? Math.min(0.05, now - prev) : 0.016;
        prev = now;

        const boot = Math.max(0, 1 - elapsed / 1.4);        // entrance scan
        const scanY = (elapsed / 1.4) * H;
        const pActive = Math.max(0, 1 - (tMs - pAt) / 900);
        pull += (pullTarget - pull) * 0.08;                 // CTA gathering easing
        recon += (reconTarget - recon) * 0.05;              // reconstruction state easing
        const cx = W / 2, cy = H * 0.45;                    // focal point at screen center

        // Parallax reference: follow the mouse when present, otherwise drift slowly on its own (mobile gets depth drift too)
        let nmx, nmy;
        if (mouseValid && pActive > 0.02) { nmx = (px - W / 2) / (W / 2); nmy = (py - H / 2) / (H / 2); }
        else { nmx = Math.sin(now * 0.16) * 0.35; nmy = Math.cos(now * 0.13) * 0.35; }

        const fx = W * 0.82, fy = H * 0.42;                 // focal point of the "reconstructed space" on the right

        ctx.clearRect(0, 0, W, H);                          // transparent -> reveals the glow underneath

        for (const p of cells) {
            p.t += dt * (1 + recon * 2.4);   // faster flicker while reconstructing
            if (p.t >= p.cycle) { reseed(p); p.t = 0; }

            let a = 0;
            if (p.t < p.on) {
                const env = Math.sin(Math.PI * p.t / p.on);
                const breath = 0.55 + 0.45 * Math.sin(now * p.freq + p.phase);
                a = p.maxA * env * breath;
            }
            let blueAmt = p.blue ? 1 : 0;   // continuous "blue intensity" 0..1, not a hard switch

            // Depth-based parallax offset
            let ox = nmx * p.depth * 16, oy = nmy * p.depth * 16;

            if (boot > 0) {
                a *= (1 + boot * 0.7);
                const d = (p.y - scanY) / 70;
                a += Math.exp(-d * d) * boot * 0.45;
            }

            // CTA hover: tiles are pulled toward the right focal point; blue spreads radially and smoothly from the focus (no hard boundary)
            if (pull > 0.01) {
                const tox = fx - p.x, toy = fy - p.y, df = Math.hypot(tox, toy) || 1;
                ox += (tox / df) * pull * 12 * p.depth;
                oy += (toy / df) * pull * 12 * p.depth;
                const focalR = W * 0.62;
                const glow = Math.exp(-(df * df) / (focalR * focalR));  // smooth falloff 1->0
                a += pull * glow * 0.40;
                blueAmt += pull * glow;
            }

            // Reconstruction state: all tiles gather toward screen center, tinting blue toward the center
            if (recon > 0.01) {
                const tcx = cx - p.x, tcy = cy - p.y, dc = Math.hypot(tcx, tcy) || 1;
                ox += (tcx / dc) * recon * 18 * p.depth;
                oy += (tcy / dc) * recon * 18 * p.depth;
                const R = Math.min(W, H) * 0.7;
                const glow = Math.exp(-(dc * dc) / (R * R));
                a += recon * (0.16 + glow * 0.34);
                blueAmt += recon * (0.30 + glow * 0.70);
            }

            // Pointer glow
            if (pActive > 0) {
                const dx = p.x - px, dy = p.y - py, dist = Math.hypot(dx, dy);
                if (dist < 130) { const g = (1 - dist / 130) * pActive; a += g * 0.5; blueAmt += g * 0.9; }
            }

            // Click ripples
            for (let i = 0; i < ripples.length; i++) {
                const age = (tMs - ripples[i].t) / 1000;
                if (age > 1.1) continue;
                const rad = age * 460;
                const dx = p.x - ripples[i].x, dy = p.y - ripples[i].y, dist = Math.hypot(dx, dy);
                const ring = Math.exp(-Math.pow((dist - rad) / 36, 2)) * (1 - age);
                if (ring > 0.04) { a += ring * 0.7; blueAmt += ring * 1.2; }
            }

            if (a < 0.012) continue;
            a = Math.min(0.7, a);
            blueAmt = blueAmt > 1 ? 1 : blueAmt;
            const x = p.x + ox, y = p.y + oy;
            const w = p.cw * cell - 2, h = p.ch * cell - 2;
            // Linear interpolation gray <-> blue by blueAmt -> smooth transition, avoids a hard left/right split
            const fr = (24 + 46 * blueAmt) | 0;
            const fg = (24 + 76 * blueAmt) | 0;
            const fb = (30 + 225 * blueAmt) | 0;
            const fill = 'rgba(' + fr + ',' + fg + ',' + fb + ',' + (a * (0.85 + 0.15 * blueAmt)) + ')';
            const sr = (255 - 105 * blueAmt) | 0;
            const sg = (255 - 80 * blueAmt) | 0;
            const stroke = 'rgba(' + sr + ',' + sg + ',255,' + Math.min(0.4, a + 0.11) + ')';
            drawTile(x, y, w, h, fill, stroke);
        }

        while (ripples.length && (tMs - ripples[0].t) / 1000 > 1.1) ripples.shift();
        requestAnimationFrame(frame);
    }

    const ctaBtn = document.querySelector('.pick');
    if (ctaBtn) {
        ctaBtn.addEventListener('pointerenter', () => { pullTarget = 1; });
        ctaBtn.addEventListener('pointerleave', () => { pullTarget = 0; });
    }

    let rt;
    window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(build, 200); });
    build();
    requestAnimationFrame(frame);
})();

/* Upload logic */
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const filePreview = document.getElementById('filePreview');
const previewImg = document.getElementById('previewImg');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const uploadBtn = document.getElementById('uploadBtn');
const loading = document.getElementById('loading');
const progressText = document.getElementById('progressText');
const countSlider = document.getElementById('countSlider');
const countVal = document.getElementById('countVal');
if (countSlider) countSlider.addEventListener('input', () => { countVal.textContent = countSlider.value; });

let selectedFile = null;

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.opacity = '.7'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.opacity = '1'; });
dropZone.addEventListener('drop', (e) => {
    e.preventDefault(); dropZone.style.opacity = '1';
    if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
});

function handleFile(file) {
    const validTypes = ['image/png', 'image/jpeg', 'image/webp', 'image/bmp'];
    if (!validTypes.includes(file.type)) { alert('Please choose an image (PNG/JPG/WebP/BMP)'); return; }
    if (file.size > 16 * 1024 * 1024) { alert('File exceeds the 16MB limit'); return; }

    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = (file.size / 1024).toFixed(1) + ' KB';

    const reader = new FileReader();
    reader.onload = (e) => {
        previewImg.src = e.target.result;
        filePreview.classList.add('show');
        uploadBtn.classList.add('show');
        uploadBtn.disabled = false;
    };
    reader.readAsDataURL(file);
}

uploadBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    uploadBtn.disabled = true;
    uploadBtn.textContent = 'Reconstructing…';
    loading.classList.add('show');
    if (window.memoryReconstruct) window.memoryReconstruct(true);   // background enters reconstruction state

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('count', countSlider ? countSlider.value : '6');
    try {
        const uploadResp = await fetch('/upload', { method: 'POST', body: formData });
        const uploadData = await uploadResp.json();
        if (uploadData.error) { alert('Upload failed: ' + uploadData.error); resetUI(); return; }
        await pollStatus(uploadData.task_id);
        window.location.href = uploadData.redirect;
    } catch (err) {
        alert('Network error: ' + err.message);
        resetUI();
    }
});

async function pollStatus(taskId) {
    while (true) {
        const resp = await fetch('/status/' + taskId);
        const data = await resp.json();
        if (data.status === 'done' || data.status === 'error') {
            progressText.textContent = (data.progress || 'DONE').toUpperCase();
            return;
        }
        progressText.textContent = (data.progress || 'PROCESSING…').toUpperCase();
        await new Promise(r => setTimeout(r, 2000));
    }
}

function resetUI() {
    uploadBtn.disabled = false;
    uploadBtn.textContent = 'Begin reconstruction →';
    loading.classList.remove('show');
    if (window.memoryReconstruct) window.memoryReconstruct(false);   // exit reconstruction state
}
</script>
